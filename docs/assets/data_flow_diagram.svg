<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="600" fill="#f8fafc" />
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e293b">Data Flow Architecture</text>
  
  <!-- Boxes -->
  <rect x="100" y="60" width="200" height="40" rx="8" fill="url(#boxGradient)" />
  <text x="200" y="85" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Projects</text>
  
  <rect x="100" y="130" width="200" height="40" rx="8" fill="url(#boxGradient)" />
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Graph Builder</text>
  
  <rect x="100" y="200" width="200" height="40" rx="8" fill="url(#boxGradient)" />
  <text x="200" y="225" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Network Analysis</text>
  
  <rect x="100" y="270" width="200" height="40" rx="8" fill="url(#boxGradient)" />
  <text x="200" y="295" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Scoring Engines</text>
  
  <rect x="100" y="340" width="200" height="40" rx="8" fill="url(#boxGradient)" />
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">MCDA</text>
  
  <rect x="100" y="410" width="200" height="40" rx="8" fill="url(#boxGradient)" />
  <text x="200" y="435" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Simulation</text>
  
  <rect x="100" y="480" width="200" height="40" rx="8" fill="#10b981" />
  <text x="200" y="505" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Recommendations</text>
  
  <!-- Arrows -->
  <line x1="200" y1="100" x2="200" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="200" y1="170" x2="200" y2="195" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="200" y1="240" x2="200" y2="265" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="200" y1="310" x2="200" y2="335" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="200" y1="380" x2="200" y2="405" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="200" y1="450" x2="200" y2="475" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
</svg>
