<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SDG Civic Decision Intelligence Platform - Model, simulate, evaluate and optimize civic projects aligned with the 17 UN Sustainable Development Goals." />
    <title>SDG Civic Decision Intelligence Platform</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SDG Planner" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Apply saved theme before first paint to avoid token/CLS flash -->
    <script>
      (function () {
        var theme = localStorage.getItem('sdg_platform_theme') || 'light';
        var lang = localStorage.getItem('sdg_platform_lang') || 'pt-BR';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('lang', lang);
      })();
    </script>

    <!-- Critical CSS: above-the-fold layout inlined to unblock first paint -->
    <style>
      :root {
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-heading: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --space-sm: 12px;
        --space-md: 16px;
        --space-xl: 32px;
        --radius-md: 16px;
        --bg-body: #eef2f7;
        --bg-primary: #eef2f7;
        --bg-glass: rgba(255, 255, 255, 0.72);
        --text-primary: #1a202c;
        --border-color: rgba(255, 255, 255, 0.7);
        --sidebar-bg: rgba(248, 250, 255, 0.85);
        --sidebar-width: 272px;
      }
      [data-theme='dark'] {
        --bg-body: #0f1117;
        --bg-primary: #0f1117;
        --bg-glass: rgba(26, 29, 39, 0.9);
        --text-primary: #f0f4ff;
        --border-color: rgba(255, 255, 255, 0.07);
        --sidebar-bg: rgba(15, 17, 23, 0.95);
      }
      [data-theme='high-contrast'] {
        --bg-body: #000;
        --bg-primary: #000;
        --bg-glass: #0a0a0a;
        --text-primary: #fff;
        --border-color: #fff;
        --sidebar-bg: #000;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; }
      body {
        font-family: var(--font-sans);
        background: var(--bg-body);
        color: var(--text-primary);
        min-height: 100svh;
        line-height: 1.6;
      }
      #app, .app-container { display: flex; min-height: 100svh; width: 100%; }
      .sidebar { width: var(--sidebar-width); flex-shrink: 0; display: flex; flex-direction: column; }
      .mobile-header {
        display: none;
        position: sticky;
        top: 0;
        z-index: 50;
        height: 56px;
        min-height: 56px;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-sm) var(--space-md);
        background: var(--sidebar-bg);
        border-bottom: 1.5px solid var(--border-color);
        contain: layout style;
      }
      .mobile-header-brand { display: flex; align-items: center; gap: var(--space-sm); min-width: 0; }
      .mobile-header-badge {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, #4f46e5, #818cf8);
      }
      .mobile-header-title {
        font-family: var(--font-heading);
        font-size: 1rem;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .main-content { flex: 1; padding: var(--space-xl); background: var(--bg-primary); min-width: 0; }
      .clay-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        border-radius: var(--radius-md);
        border: 1.5px solid var(--border-color);
        background: var(--bg-glass);
        cursor: pointer;
        font-family: var(--font-sans);
        font-size: 0.875rem;
        font-weight: 600;
      }
      .mobile-menu-toggle {
        width: 40px;
        height: 40px;
        min-width: 40px;
        min-height: 40px;
        padding: 0;
        flex-shrink: 0;
        contain: layout style;
      }
      .app-shell { pointer-events: none; }
      @media (max-width: 900px) {
        .sidebar { display: none; }
        .app-container { flex-direction: column; }
        .mobile-header { display: flex; width: 100%; flex-shrink: 0; }
        .main-content { padding: var(--space-md); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Static shell reserves layout before JS hydrates (replaced on mount) -->
      <div class="app-container app-shell" aria-hidden="true">
        <aside class="sidebar no-print"></aside>
        <header class="mobile-header no-print">
          <div class="mobile-header-brand">
            <div class="mobile-header-badge"></div>
            <span class="mobile-header-title">Plataforma Cívica ODS</span>
          </div>
          <button type="button" class="clay-button mobile-menu-toggle" tabindex="-1" aria-hidden="true"></button>
        </header>
        <main class="main-content"></main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
